<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0a0a0f"/>
  <rect x="0" y="0" width="1200" height="4" fill="#c93d3d"/>

  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Fake heatmap cells -->
  <g transform="translate(60, 240)">
    <rect x="0" y="0" width="40" height="40" rx="4" fill="#0d3b2e"/>
    <rect x="44" y="0" width="40" height="40" rx="4" fill="#1a6b4a"/>
    <rect x="88" y="0" width="40" height="40" rx="4" fill="#3d8b37"/>
    <rect x="132" y="0" width="40" height="40" rx="4" fill="#b8a02e"/>
    <rect x="176" y="0" width="40" height="40" rx="4" fill="#d4822a"/>
    <rect x="220" y="0" width="40" height="40" rx="4" fill="#c93d3d"/>
    <rect x="264" y="0" width="40" height="40" rx="4" fill="#8b1a1a"/>

    <rect x="0" y="44" width="40" height="40" rx="4" fill="#1a6b4a"/>
    <rect x="44" y="44" width="40" height="40" rx="4" fill="#d4822a"/>
    <rect x="88" y="44" width="40" height="40" rx="4" fill="#c93d3d"/>
    <rect x="132" y="44" width="40" height="40" rx="4" fill="#b8a02e"/>
    <rect x="176" y="44" width="40" height="40" rx="4" fill="#0d3b2e"/>
    <rect x="220" y="44" width="40" height="40" rx="4" fill="#3d8b37"/>
    <rect x="264" y="44" width="40" height="40" rx="4" fill="#1a6b4a"/>

    <rect x="0" y="88" width="40" height="40" rx="4" fill="#3d8b37"/>
    <rect x="44" y="88" width="40" height="40" rx="4" fill="#0d3b2e"/>
    <rect x="88" y="88" width="40" height="40" rx="4" fill="#1a6b4a"/>
    <rect x="132" y="88" width="40" height="40" rx="4" fill="#c93d3d"/>
    <rect x="176" y="88" width="40" height="40" rx="4" fill="#8b1a1a"/>
    <rect x="220" y="88" width="40" height="40" rx="4" fill="#d4822a"/>
    <rect x="264" y="88" width="40" height="40" rx="4" fill="#b8a02e"/>
  </g>

  <!-- Title -->
  <text x="400" y="200" font-family="monospace" font-size="52" font-weight="700" fill="#d8dae5" letter-spacing="4">
    SIREN DASHBOARD
  </text>

  <text x="400" y="260" font-family="monospace" font-size="24" fill="#7b7f9e" letter-spacing="2">
    Tel Aviv / Gush Dan
  </text>

  <text x="400" y="340" font-family="monospace" font-size="18" fill="#4a4d6a">
    Alertas de misiles y drones — Heatmap dia x hora
  </text>

  <text x="400" y="380" font-family="monospace" font-size="18" fill="#4a4d6a">
    Tendencias y recomendaciones para tu rutina
  </text>

  <!-- Stats -->
  <g transform="translate(400, 430)">
    <rect x="0" y="0" width="120" height="60" rx="6" fill="#181a28" stroke="#252840" stroke-width="1"/>
    <text x="60" y="28" font-family="monospace" font-size="20" font-weight="700" fill="#6ea8d7" text-anchor="middle">141</text>
    <text x="60" y="48" font-family="monospace" font-size="10" fill="#4a4d6a" text-anchor="middle">ALERTAS</text>

    <rect x="130" y="0" width="120" height="60" rx="6" fill="#181a28" stroke="#252840" stroke-width="1"/>
    <text x="190" y="28" font-family="monospace" font-size="20" font-weight="700" fill="#c93d3d" text-anchor="middle">86</text>
    <text x="190" y="48" font-family="monospace" font-size="10" fill="#4a4d6a" text-anchor="middle">MISILES</text>

    <rect x="260" y="0" width="120" height="60" rx="6" fill="#181a28" stroke="#252840" stroke-width="1"/>
    <text x="320" y="28" font-family="monospace" font-size="20" font-weight="700" fill="#d4822a" text-anchor="middle">55</text>
    <text x="320" y="48" font-family="monospace" font-size="10" fill="#4a4d6a" text-anchor="middle">DRONES</text>
  </g>

  <text x="60" y="580" font-family="monospace" font-size="12" fill="#252840">
    Datos: Tzofar + Pikud HaOref | Feb-Mar 2026
  </text>
